{% extends "base.html" %}
{% block title %}{% if user %}Modifier utilisateur{% else %}Nouvel utilisateur{% endif %} — IT Helpdesk{% endblock %}
{% block content %}

<div class="page-header">
  <div>
    <a href="{{ url_for('admin_users') }}" class="back-link">← Retour</a>
    <h1>{% if user %}Modifier : {{ user.full_name }}{% else %}Nouvel utilisateur{% endif %}</h1>
  </div>
</div>

<div class="form-card">
  <form method="POST">
    <div class="form-row">
      <div class="form-group">
        <label>Nom complet <span class="required">*</span></label>
        <input type="text" name="full_name" class="form-control" required
               value="{{ user.full_name if user else '' }}">
      </div>
      <div class="form-group">
        <label>Identifiant <span class="required">*</span></label>
        <input type="text" name="username" class="form-control" required
               value="{{ user.username if user else '' }}"
               {% if user %}readonly{% endif %}>
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label>Email <span class="required">*</span></label>
        <input type="email" name="email" class="form-control" required
               value="{{ user.email if user else '' }}">
      </div>
      <div class="form-group">
        <label>Rôle <span class="required">*</span></label>
        <select name="role" class="form-control" required>
          <option value="user"  {% if user and user.role == 'user'  %}selected{% endif %}>Utilisateur</option>
          <option value="tech"  {% if user and user.role == 'tech'  %}selected{% endif %}>Technicien</option>
          <option value="admin" {% if user and user.role == 'admin' %}selected{% endif %}>Administrateur</option>
        </select>
      </div>
    </div>

    <div class="form-group">
      <label>Mot de passe {% if user %}<span class="text-muted">(laisser vide pour ne pas changer)</span>{% else %}<span class="required">*</span>{% endif %}</label>
      <input type="password" name="password" class="form-control" {% if not user %}required{% endif %}
             placeholder="{% if user %}Nouveau mot de passe{% else %}Mot de passe{% endif %}">
    </div>

    <div class="form-actions">
      <a href="{{ url_for('admin_users') }}" class="btn btn-secondary">Annuler</a>
      <button type="submit" class="btn btn-primary">
        {% if user %}Enregistrer{% else %}Créer{% endif %}
      </button>
    </div>
  </form>
</div>
{% endblock %}
